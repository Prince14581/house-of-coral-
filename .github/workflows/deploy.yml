name: House-of-Coral Production Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Required Files
        run: |
          test -f package.json
          test -f package-lock.json
          test -f Dockerfile
          test -f server.js
          test -f .env.example
          test -f scripts/ReconcileTreasury.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install and Validate
        run: |
          npm ci
          npm run lint --if-present
          npm run format:check --if-present
          npm test
          npm audit --audit-level=critical
          node scripts/ReconcileTreasury.js --dry-run

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          test -n "${{ secrets.DOCKER_USER }}"
          test -n "${{ secrets.DOCKER_PASS }}"
          test -n "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Validate Docker Build Locally
        run: docker build . --no-cache

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/house-of-coral:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/house-of-coral:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Inspect Image
        run: docker buildx imagetools inspect ${{ secrets.DOCKER_USER }}/house-of-coral:${{ github.sha }}

      - name: Trigger Render Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Verify Deployment (Poll JSON Health)
        run: |
          echo "Verifying health endpoint JSON payload..."
          for i in {1..20}; do
            RESPONSE=$(curl --silent --fail https://house-of-coral.onrender.com/api/health)
            if echo "$RESPONSE" | grep -q '"status":"OK"'; then
              echo "Deployment successful and JSON verified!"
              exit 0
            fi
            echo "Attempt $i: Health check pending..."
            sleep 15
          done
          echo "Deployment failed health check."
          exit 1

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: |
            *.log
            npm-debug.log*
