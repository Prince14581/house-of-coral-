name: House-of-Coral Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Master Integrity Test
        env:
          DB_URI: ${{ secrets.DB_URI }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: node test-master.js

  deploy:
    needs: test-integrity  # This ensures deployment ONLY happens if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: ./deploy-script.sh
